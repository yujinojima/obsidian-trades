name: Deploy markdown to GitHub Pages

# GitHub Pages will render the markdown files via the default Jekyll path.
# This workflow is intentionally minimal — the repo is just markdown + PNGs.
# For richer rendering (graph view, wikilink resolution), add Quartz later.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first run; avoids "Not Found" if Pages
          # hasn't been turned on in Settings → Pages yet.
          enablement: true

      - name: Build with Jekyll (default)
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
